name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
  pull_request:

jobs:
  validate:
    name: Validate Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install backend dependencies
        run: ./.venv/bin/python -m pip install --upgrade pip && ./.venv/bin/python -m pip install -r aiops/requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run workspace validation
        shell: pwsh
        run: ./scripts/validate.ps1

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install backend dependencies
        run: ./.venv/bin/python -m pip install --upgrade pip && ./.venv/bin/python -m pip install -r aiops/requirements-dev.txt

      - name: Run backend unit and integration tests
        working-directory: aiops
        run: ../.venv/bin/python -m pytest -q
