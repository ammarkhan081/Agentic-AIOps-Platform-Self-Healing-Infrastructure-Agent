version: "3.9"

services:

  # ── Target Microservices ──────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: ashia-api-gateway
    ports:
      - "8000:8000"
    environment:
      - USER_SERVICE_URL=http://user-service:8001
      - ORDER_SERVICE_URL=http://order-service:8002
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - user-service
      - order-service
    networks:
      - ashia-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build: ./user-service
    container_name: ashia-user-service
    ports:
      - "8001:8001"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - ashia-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-service:
    build: ./order-service
    container_name: ashia-order-service
    ports:
      - "8002:8002"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - ashia-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Observability Stack ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ashia-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=24h"
    networks:
      - ashia-net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: ashia-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ashia-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: ashia-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ashia-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: ashia-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - ashia-net
    restart: unless-stopped

  # ── Databases ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ashia-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ashia
      - POSTGRES_PASSWORD=ashia_secret
      - POSTGRES_DB=ashia_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ashia-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ashia -d ashia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ashia-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - ashia-net
    restart: unless-stopped

volumes:
  prometheus-data:
  loki-data:
  postgres-data:
  redis-data:

networks:
  ashia-net:
    driver: bridge
